apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "game2048.name" . }}-test-connection"
  namespace: "{{ include "game2048.name" . }}"
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args:
        - '--header=Host: game2048.local'
        - ['{{ .Values.service.name }}:{{ .Values.service.port }}']
  restartPolicy: Never
